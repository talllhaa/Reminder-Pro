<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemindPro | Luxury Task Management</title>
    <!-- PWA Manifest link -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    
    <!-- Google Fonts, FontAwesome Icons & Confetti -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --accent: #00f2ff;
            --accent-secondary: #7000ff;
            --bg-deep: #05050a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --grad: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- ANIMATED LUXURY BACKGROUND --- */
        .bg-visuals {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            animation: orbit 20s infinite linear;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--accent); top: -10%; left: -10%; }
        .orb-2 { width: 300px; height: 300px; background: var(--accent-secondary); bottom: -10%; right: -10%; animation-delay: -5s; }
        
        @keyframes orbit {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(100px, 100px) rotate(360deg); }
        }

        .app-container {
            width: 100%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: appEntrance 1s ease-out;
        }

        @keyframes appEntrance {
            from { opacity: 0; transform: scale(0.9) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            text-align: center;
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 30px;
            background: var(--grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-card { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; color: var(--text-dim); margin-left: 5px; }

        input, select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 15px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .repeat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        #addBtn {
            background: var(--grad);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
        }

        #addBtn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(112, 0, 255, 0.4); }

        .task-container { max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .task-container::-webkit-scrollbar { width: 4px; }
        .task-container::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .task-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(30px);
        }

        .task-item.show { opacity: 1; transform: translateY(0); }
        .task-item:hover { background: rgba(255, 255, 255, 0.08); border-color: var(--accent); transform: scale(1.02); }

        .task-details h4 { font-size: 1.2rem; margin-bottom: 5px; }
        .task-details p { font-size: 0.8rem; color: var(--text-dim); }
        .tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 3px 10px;
            background: var(--accent-secondary);
            border-radius: 20px;
            margin-top: 8px;
            font-weight: 600;
        }

        .timer { font-family: monospace; color: var(--accent); font-size: 0.9rem; display: block; margin-top: 10px; }

        .actions { display: flex; gap: 10px; }
        .btn-action {
            width: 40px; height: 40px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            color: white;
        }
        .done-btn { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .del-btn { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .btn-action:hover { transform: rotate(10deg) scale(1.1); background: white; color: black; }

        .completed { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="bg-visuals">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="app-container">
        <h1><i class="fa-solid fa-bell"></i> RemindPro</h1>
        
        <div class="input-card">
            <div class="field">
                <label>TASK DESCRIPTION</label>
                <input type="text" id="taskInput" placeholder="e.g., Gym Session or Client Call">
            </div>
            
            <div class="field">
                <label>START DATE & TIME</label>
                <input type="datetime-local" id="timeInput">
            </div>

            <div class="field">
                <label>REPETITION</label>
                <div class="repeat-grid">
                    <select id="repeatType" onchange="toggleRepeatValue()">
                        <option value="none">Once</option>
                        <option value="minutes">Every X Minutes</option>
                        <option value="hours">Every X Hours</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                    </select>
                    <input type="number" id="repeatValue" value="1" min="1" style="display:none;">
                </div>
            </div>
            
            <button id="addBtn" onclick="addTask()">Create Reminder</button>
        </div>

        <div class="task-container" id="taskList"></div>
    </div>

    <audio id="alarmSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // REGISTER SERVICE WORKER FOR PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker Registered!'))
                .catch(err => console.log('SW Registration Failed', err));
            });
        }

        let tasks = JSON.parse(localStorage.getItem('luxury_reminders')) || [];

        window.onload = () => {
            if (Notification.permission !== "granted") Notification.requestPermission();
            renderTasks();
            startClock();
        };

        function toggleRepeatValue() {
            const type = document.getElementById('repeatType').value;
            const valInput = document.getElementById('repeatValue');
            valInput.style.display = (type === 'minutes' || type === 'hours') ? 'block' : 'none';
        }

        function addTask() {
            const text = document.getElementById('taskInput').value;
            const time = document.getElementById('timeInput').value;
            const repeatType = document.getElementById('repeatType').value;
            const repeatValue = parseInt(document.getElementById('repeatValue').value);

            if (!text || !time) {
                alert("Please specify the task and the time!");
                return;
            }

            const task = { id: Date.now(), text, time, repeatType, repeatValue, completed: false, notified: false };
            tasks.push(task);
            saveAndRender();
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00f2ff', '#7000ff', '#ffffff'] });
            document.getElementById('taskInput').value = '';
            document.getElementById('timeInput').value = '';
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }

        function toggleComplete(id) {
            tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('luxury_reminders', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.sort((a, b) => new Date(a.time) - new Date(b.time)).forEach((task, index) => {
                const div = document.createElement('div');
                div.className = `task-item ${task.completed ? 'completed' : ''}`;
                let repeatLabel = task.repeatType === 'none' ? "Single" : (task.repeatType === 'daily' ? "Daily" : (task.repeatType === 'weekly' ? "Weekly" : `Every ${task.repeatValue} ${task.repeatType}`));

                div.innerHTML = `
                    <div class="task-details">
                        <h4>${task.text}</h4>
                        <p><i class="fa-regular fa-calendar"></i> ${new Date(task.time).toLocaleString()}</p>
                        <span class="tag"><i class="fa-solid fa-repeat"></i> ${repeatLabel}</span>
                        <span class="timer" id="timer-${task.id}">Calculating...</span>
                    </div>
                    <div class="actions">
                        <button class="btn-action done-btn" onclick="toggleComplete(${task.id})"><i class="fa-solid fa-check"></i></button>
                        <button class="btn-action del-btn" onclick="deleteTask(${task.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(div);
                setTimeout(() => { div.classList.add('show'); }, index * 100);
            });
        }

        function startClock() {
            setInterval(() => {
                const now = new Date().getTime();
                tasks.forEach(task => {
                    const taskTime = new Date(task.time).getTime();
                    const diff = taskTime - now;
                    const timerEl = document.getElementById(`timer-${task.id}`);
                    if (timerEl) {
                        if (diff > 0) {
                            const hours = Math.floor(diff / (1000 * 60 * 60));
                            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                            const secs = Math.floor((diff % (1000 * 60)) / 1000);
                            timerEl.innerText = `T-Minus: ${hours}h ${mins}m ${secs}s`;
                        } else { timerEl.innerText = "Time to action!"; }
                    }
                    if (diff <= 0 && !task.notified && !task.completed) {
                        triggerAlarm(task);
                        task.notified = true;
                        if (task.repeatType !== 'none') {
                            let nextDate = new Date();
                            if (task.repeatType === 'minutes') nextDate.setMinutes(nextDate.getMinutes() + task.repeatValue);
                            else if (task.repeatType === 'hours') nextDate.setHours(nextDate.getHours() + task.repeatValue);
                            else if (task.repeatType === 'daily') nextDate.setDate(nextDate.getDate() + 1);
                            else if (task.repeatType === 'weekly') nextDate.setDate(nextDate.getDate() + 7);
                            task.time = nextDate.toISOString();
                            task.notified = false; 
                        }
                        saveAndRender();
                    }
                });
            }, 1000);
        }

        function triggerAlarm(task) {
            document.getElementById('alarmSound').play();
            if (Notification.permission === "granted") {
                new Notification("✨ RemindPro", { body: task.text, icon: 'https://cdn-icons-png.flaticon.com/512/311/311074.png' });
            }
            alert(`💎 LUXURY REMINDER: ${task.text}`);
        }
    </script>
</body>
</html>
